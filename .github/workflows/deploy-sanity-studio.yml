name: Deploy Sanity Studio

# Redeploy the hosted Sanity Studio whenever studio changes land on master,
# so the live Studio schema always matches what's in Git.
on:
  push:
    branches: [master]
    paths:
      - "studio-all-gade/**"
      - ".github/workflows/deploy-sanity-studio.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Avoid overlapping deploys; cancel an in-progress run if a newer one starts.
concurrency:
  group: deploy-sanity-studio
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio-all-gade
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: studio-all-gade/package-lock.json

      - name: Install dependencies
        # --legacy-peer-deps matches how the lockfile was generated:
        # sanity-plugin-lucide-icon-picker peers on @sanity/ui v2 while the
        # studio uses v3, which strict npm ci would otherwise reject.
        run: npm ci --legacy-peer-deps

      - name: Deploy Studio
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: npx sanity deploy
